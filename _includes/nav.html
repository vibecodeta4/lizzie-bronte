<nav class="nav" id="mainNav" role="navigation" aria-label="Main navigation">
  <div class="nav__inner">
    <a href="/index.html" class="nav__logo" aria-label="Bronte Advisory Home">
      <img src="/images/Logo_Full.png" alt="Bronte Advisory" />
    </a>
    <ul class="nav__links" role="list">
      {% for link in navigation.nav_links %}
      <li><a href="{{ link.url }}" class="nav__link"{% if active_nav == link.id %} aria-current="page"{% endif %}>{{ link.label }}</a></li>
      {% endfor %}
    </ul>
    <a href="{{ navigation.nav_cta_url }}" class="btn btn-primary nav__cta">{{ navigation.nav_cta_label }}</a>
    <button class="nav__hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav__mobile" id="mobileMenu" role="dialog" aria-label="Mobile navigation">
  <button id="mobileClose" aria-label="Close menu" style="position:absolute;top:var(--space-6);right:var(--space-6);background:none;border:none;cursor:pointer;font-size:1.5rem;color:var(--color-deep-purple);">&#x2715;</button>
  <ul role="list" style="display:flex;flex-direction:column;align-items:center;gap:var(--space-8);">
    {% for link in navigation.nav_links %}
    <li><a href="{{ link.url }}" class="nav__link">{{ link.label }}</a></li>
    {% endfor %}
  </ul>
  <a href="{{ navigation.nav_cta_url }}" class="btn btn-primary" style="margin-top:var(--space-8);">{{ navigation.nav_cta_label }}</a>
</div>
