<script>
  const nav = document.getElementById('mainNav');
  const scrollThreshold = {{ scroll_threshold | default: 60 }};
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > scrollThreshold);
  }, { passive: true });

  const hamburger = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  const mobileClose = document.getElementById('mobileClose');

  hamburger.addEventListener('click', () => {
    mobileMenu.classList.add('open');
    hamburger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  });

  const closeMenu = () => {
    mobileMenu.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  };

  mobileClose.addEventListener('click', closeMenu);
  mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', closeMenu));

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('revealed'), 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
