voice_eyebrow: "The Methodology"
voice_title: "The VOICE"
voice_title_em: "Framework™"
voice_intro: "A proprietary framework built from research, coaching practice, and deep study of how high-performing women close the gap between external achievement and internal authority."
voice_pillars:
  - letter: "V"
    word: "Visibility"
    desc: "Owning your presence in high-stakes rooms without shrinking, over-explaining, or performing."
  - letter: "O"
    word: "Ownership"
    desc: "Taking authority over your decisions, your narrative, and your influence without waiting for permission."
  - letter: "I"
    word: "Intuition"
    desc: "Trusting your instincts under pressure — not overriding them with external validation or excessive preparation."
  - letter: "C"
    word: "Conviction"
    desc: "Communicating with clarity and certainty — even when others push back, question, or challenge your perspective."
  - letter: "E"
    word: "Embodiment"
    desc: "Leading from a place of grounded identity — so authority becomes natural, not a role you have to step into."

philosophy_eyebrow: "The Approach"
philosophy_title: "Research, philosophy, and"
philosophy_title_em: "lived experience"
philosophy_body_1: "Dr. Bronte's approach is not a collection of confidence hacks or motivational frameworks. It is a rigorous, research-grounded methodology that helps women understand the psychology behind self-doubt — and systematically dismantle it."
philosophy_body_2: "Drawing on Stoic philosophy, organizational psychology, and over a decade of working at the intersection of leadership and identity, she helps clients move from self-editing to self-trust in a way that is lasting — not situational."
philosophy_body_3: "The result is a leader who doesn't manage her confidence. She simply leads."
philosophy_approaches:
  - title: "Research-Grounded"
    body: "Every framework and intervention is rooted in peer-reviewed research on imposter syndrome, leadership psychology, and organizational behavior — not anecdote or trend."
  - title: "Stoic Philosophy"
    body: "The ancient discipline of separating what is within your control from what is not is quietly revolutionary for women navigating modern high-stakes leadership."
  - title: "Lived Experience"
    body: "Dr. Bronte brings her own experience of navigating authority, visibility, and identity to every client engagement — with earned empathy and hard-won insight."

beyond_eyebrow: "Beyond the Advisory"
beyond_title: "A commitment to"
beyond_title_em: "wider impact"
beyond_cards:
  - tag: "Foundation"
    title: "Just Like You Global Foundation"
    body: "An advocacy initiative dedicated to dignity, visibility, and empowerment — particularly for women impacted by domestic abuse and systemic barriers. Every woman deserves to be fully seen."
  - tag: "Community"
    title: "Unseen No More Community"
    body: "A community space for women navigating visibility, resilience, and the courage to step forward. Built on the conviction that being seen is not a privilege — it is a right."
  - tag: "Book"
    title: "Unseen No More"
    body: "Dr. Bronte's book exploring ambition, resilience, and the freedom of being fully seen — for any woman who has ever made herself smaller to make others comfortable."

