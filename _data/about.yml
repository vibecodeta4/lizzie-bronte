intro_eyebrow: "The Work"
intro_lead: "At the intersection of leadership, psychology, and"
intro_lead_em: "performance under pressure."
intro_body_1: "Dr. Lizzie Bronte is a leadership advisor and founder of Bronte Advisory, where she helps high-performing professional women step into their authority in high-stakes environments — without over-preparing, second-guessing, or shrinking."
intro_body_2: "With a Ph.D. in Global Leadership and Organizational Management and coaching certifications informed by research on imposter syndrome, her work sits at the intersection of leadership, psychology, and performance under pressure."
intro_body_3: "Dr. Bronte specialises in supporting accomplished women who are externally successful but internally navigating hesitation, visibility pressure, and self-doubt as their influence grows. Through her proprietary VOICE Framework™, she equips clients to communicate with clarity, make decisive choices, and lead with grounded confidence."
intro_pullquote: "This space is for women ready to lead with authority, conviction, and composure — wherever their influence takes them."
intro_pullquote_attr: "— Dr. Lizzie Bronte"
intro_body_4: "Her approach blends research, Stoic philosophy, and lived experience to help women move from self-editing to self-trust — transforming how they show up in meetings, decision-making moments, and leadership spaces."

