letter_greeting: "If you are reading this —"
letter_body: "You are probably already <em>very good</em> at what you do.<br /><br />You have the credentials. The track record. The room in the diary.<br /><br />And yet. There is still something that pulls you back in high-stakes moments. A hesitation before you speak. A second-guess after you decide. A performance of confidence you have been perfecting for years — <em>because the alternative feels too exposed.</em><br /><br /><strong>That is exactly what we dismantle here.</strong>"
letter_sign_name: "Dr. Lizzie Bronte"
letter_sign_title: "Ph.D. · Founder, Bronte Advisory · Creator of the VOICE Framework™"

