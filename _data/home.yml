resonance_items:
  - "You over-prepare for presentations and still second-guess yourself walking out the door."
  - "You hesitate to advocate for yourself in rooms where you absolutely belong."
  - "You hold back your opinion because you are not sure it will land — or that you are right enough."
  - "You are exhausted from performing confidence rather than simply having it."
  - "You are ready for a real investment in yourself — not another course or productivity system."

