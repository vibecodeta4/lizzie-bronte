story_eyebrow: "Meet Dr. Bronte"
story_title: "I know what it feels like to be the most qualified person in the room —"
story_title_em: "and still shrink."
story_body_1: "Dr. Lizzie Bronte is a leadership advisor, author, and founder of Bronte Advisory. Her work sits at the intersection of leadership, psychology, and performance under pressure — and it is grounded in a Ph.D., research on imposter syndrome, and lived experience."
story_pullquote: "The hesitation you feel is not a character flaw. It is a pattern — and patterns can be dismantled."
story_body_2: "Through the VOICE Framework™, she helps accomplished women close the gap between their external success and their internal experience of leading — permanently."
story_cta_label: "Read Full Bio"
story_cta_url: "/about.html"

quote_text: "You are not lacking confidence. You are carrying a version of yourself that was built to earn her place — not take it."
quote_attr: "— Dr. Lizzie Bronte"

