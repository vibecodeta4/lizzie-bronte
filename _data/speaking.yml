intro_eyebrow: "Dr. Bronte as a Speaker"
intro_title: "A keynote that"
intro_title_em: "stays with you"
intro_body_1: "Dr. Lizzie Bronte brings over a decade of research and advisory experience to every stage. Her talks are not motivational speeches — they are research-grounded, intellectually rigorous, and deeply practical for the high-performing women in your organization."
intro_body_2: "She speaks at corporate leadership retreats, women in leadership conferences, DEI events, and executive development programs — anywhere the conversation is about authority, identity, and what it means to lead without performing."
