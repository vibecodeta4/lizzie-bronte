topics_eyebrow: "Signature Topics"
topics_title: "What Dr. Bronte"
topics_title_em: "speaks on"
topics:
  - tag: "Keynote"
    title: "Owning the Room: Authority Beyond Confidence"
    body: "Why confidence is not the goal — and what grounded authority actually looks like for high-performing women in modern organizations."
  - tag: "Keynote"
    title: "The Imposter Myth: What Research Actually Says"
    body: "A research-grounded talk that reframes imposter syndrome — from individual pathology to systemic pattern — and offers a more useful response."
  - tag: "Workshop"
    title: "The VOICE Framework: Five Dimensions of Authority"
    body: "An interactive workshop introducing the VOICE Framework and how participants can apply each dimension to their own leadership contexts."
  - tag: "Keynote"
    title: "Unseen No More: Visibility, Courage, and Being Fully Seen"
    body: "Drawing on her book and advocacy work, Dr. Bronte explores what it means to step fully forward — in leadership and in life."
  - tag: "Workshop"
    title: "Leading Under Pressure: Decisions Without Doubt"
    body: "Practical tools for women who are ready to break the cycle of second-guessing and lead from a place of conviction rather than fear."
  - tag: "Panel / Fireside"
    title: "The Identity of Leadership: Custom Topic"
    body: "Dr. Bronte tailors every engagement to your organization, audience, and outcomes. Contact her team to discuss your specific brief."

