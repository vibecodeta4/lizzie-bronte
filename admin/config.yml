          - { label: "HERO — Heading Line 1", name: "hero_title", widget: "string" }
          - { label: "HERO — Heading Line 2 (italic)", name: "hero_title_em", widget: "string" }
          - { label: "HERO — Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "HERO — Primary Button Label", name: "hero_cta_primary_label", widget: "string" }
          - { label: "HERO — Primary Button URL", name: "hero_cta_primary_url", widget: "string" }
          - { label: "HERO — Secondary Button Label", name: "hero_cta_secondary_label", widget: "string" }
          - { label: "HERO — Secondary Button URL", name: "hero_cta_secondary_url", widget: "string" }
          - { label: "HERO — Photo", name: "hero_photo", widget: "image" }
          - { label: "HERO — Card Label", name: "hero_card_label", widget: "string" }
          - { label: "HERO — Card Text", name: "hero_card_text", widget: "string" }
          - { label: "LETTER — Opening Line", name: "letter_greeting", widget: "string" }
          - { label: "LETTER — Body (HTML supported for italic/bold)", name: "letter_body", widget: "text" }
          - { label: "LETTER — Signature Name", name: "letter_sign_name", widget: "string" }
          - { label: "LETTER — Signature Title", name: "letter_sign_title", widget: "string" }
