[build]
  command = "npm ci && npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/api/slots"
  to = "/.netlify/functions/get-slots"
  status = 200

[[redirects]]
  from = "/api/book"
  to = "/.netlify/functions/create-booking"
  status = 200
